<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>GradeVault — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #181c27; --surface2: #1e2235;
      --border: #2a2f45; --text: #f0f0f0; --muted: #6b7280;
      --accent: #f5c518; --danger: #f7604f;
      --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; }
    .logo { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 0.3rem; }
    .subtitle { color: var(--muted); font-size: 0.85rem; font-family: var(--font-mono); margin-bottom: 2rem; }
    label { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); font-family: var(--font-mono); margin-bottom: 6px; }
    input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-family: var(--font-display); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent); }
    .btn { width: 100%; background: var(--accent); color: #0f1117; font-family: var(--font-display); font-weight: 700; font-size: 1rem; border: none; border-radius: 8px; padding: 12px; cursor: pointer; margin-top: 1.2rem; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 1rem; font-size: 0.85rem; font-family: var(--font-mono); padding: 10px 14px; border-radius: 8px; display: none; }
    .msg.error { background: rgba(247,96,79,0.12); color: var(--danger); border: 1px solid rgba(247,96,79,0.25); }
    .msg.success { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
    .back-link { display: block; text-align: center; margin-top: 1.4rem; color: var(--muted); font-size: 0.82rem; font-family: var(--font-mono); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔑 GradeVault</div>
    <div class="subtitle">Password Recovery</div>

    <div id="form-section">
      <p style="color:var(--muted);font-size:0.88rem;margin-bottom:1.5rem;line-height:1.6">
        Enter your email address and we'll send you a link to reset your password.
      </p>
      <div style="margin-bottom:1rem">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')sendReset()"/>
      </div>
      <button class="btn" id="submit-btn" onclick="sendReset()">Send Reset Link</button>
      <div id="msg" class="msg"></div>
    </div>

    <a href="/login" class="back-link">← Back to Login</a>
  </div>

  <script>
    async function sendReset() {
      const email  = document.getElementById("email").value.trim();
      const btn    = document.getElementById("submit-btn");
      const msgEl  = document.getElementById("msg");

      msgEl.style.display = "none";
      if (!email) { showMsg("Please enter your email address.", "error"); return; }

      btn.disabled = true;
      btn.textContent = "Sending...";

      try {
        const res  = await fetch("/api/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (data.error) {
          showMsg(data.error, "error");
          btn.disabled = false;
          btn.textContent = "Send Reset Link";
        } else {
          showMsg("✅ Reset link sent! Check your email inbox (and spam folder).", "success");
          btn.disabled = true;
          btn.textContent = "Email Sent";
        }
      } catch (e) {
        showMsg("Network error. Please try again.", "error");
        btn.disabled = false;
        btn.textContent = "Send Reset Link";
      }
    }

    function showMsg(text, type) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = "msg " + type;
      el.style.display = "block";
    }
  </script>
</body>
</html>
