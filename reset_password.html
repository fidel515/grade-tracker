<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>GradeVault — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #181c27; --surface2: #1e2235;
      --border: #2a2f45; --text: #f0f0f0; --muted: #6b7280;
      --accent: #f5c518; --danger: #f7604f;
      --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; }
    .logo { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 0.3rem; }
    .subtitle { color: var(--muted); font-size: 0.85rem; font-family: var(--font-mono); margin-bottom: 2rem; }
    label { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); font-family: var(--font-mono); margin-bottom: 6px; }
    .input-wrap { position: relative; }
    input[type=password], input[type=text] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 42px 11px 14px; color: var(--text); font-family: var(--font-display); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent); }
    .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); padding: 0; display: flex; align-items: center; }
    .eye-btn:hover { color: var(--text); }
    .form-group { margin-bottom: 1rem; }
    .btn { width: 100%; background: var(--accent); color: #0f1117; font-family: var(--font-display); font-weight: 700; font-size: 1rem; border: none; border-radius: 8px; padding: 12px; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 1rem; font-size: 0.85rem; font-family: var(--font-mono); padding: 10px 14px; border-radius: 8px; display: none; }
    .msg.error { background: rgba(247,96,79,0.12); color: var(--danger); border: 1px solid rgba(247,96,79,0.25); }
    .msg.success { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
    .invalid-card { text-align: center; padding: 1rem 0; }
    .invalid-card p { color: var(--muted); font-size: 0.88rem; margin-top: 0.8rem; line-height: 1.6; }
    .back-link { display: block; text-align: center; margin-top: 1.4rem; color: var(--muted); font-size: 0.82rem; font-family: var(--font-mono); text-decoration: none; }
    .back-link:hover { color: var(--accent); }
    .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔑 GradeVault</div>
    <div class="subtitle">Set New Password</div>

    <div id="invalid-section" style="display:none" class="invalid-card">
      <p style="font-size:2rem">⚠️</p>
      <p>This reset link is <strong>invalid or has expired</strong>.<br/>Please request a new one.</p>
      <a href="/forgot-password" class="back-link" style="margin-top:1.2rem;display:inline-block">Request New Link</a>
    </div>

    <div id="form-section">
      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter new password" oninput="checkStrength(this.value)" onkeydown="if(event.key==='Enter')resetPassword()"/>
          <button type="button" class="eye-btn" onclick="togglePw('password',this)">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:18px;height:18px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm" placeholder="Repeat new password" onkeydown="if(event.key==='Enter')resetPassword()"/>
          <button type="button" class="eye-btn" onclick="togglePw('confirm',this)">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:18px;height:18px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <button class="btn" id="submit-btn" onclick="resetPassword()">Reset Password</button>
      <div id="msg" class="msg"></div>
    </div>

    <a href="/login" class="back-link">← Back to Login</a>
  </div>

  <script>
    // Get token from URL
    const params = new URLSearchParams(window.location.search);
    const TOKEN  = params.get("token") || "";

    if (!TOKEN) {
      document.getElementById("form-section").style.display = "none";
      document.getElementById("invalid-section").style.display = "block";
    }

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const show  = input.type === "password";
      input.type  = show ? "text" : "password";
      btn.style.color = show ? "var(--accent)" : "var(--muted)";
    }

    function checkStrength(val) {
      const fill = document.getElementById("strength-fill");
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ["#ef4444","#f97316","#e8c547","#4f8ef7","#22c55e"];
      const widths = ["20%","40%","60%","80%","100%"];
      fill.style.width      = score ? widths[score-1] : "0%";
      fill.style.background = score ? colors[score-1] : "transparent";
    }

    async function resetPassword() {
      const password = document.getElementById("password").value;
      const confirm  = document.getElementById("confirm").value;
      const btn      = document.getElementById("submit-btn");

      if (!password || password.length < 6) { showMsg("Password must be at least 6 characters.", "error"); return; }
      if (password !== confirm)             { showMsg("Passwords do not match.", "error"); return; }

      btn.disabled = true;
      btn.textContent = "Resetting...";

      try {
        const res  = await fetch("/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: TOKEN, password })
        });
        const data = await res.json();

        if (data.error) {
          showMsg(data.error, "error");
          btn.disabled = false;
          btn.textContent = "Reset Password";
          if (data.error.includes("expired") || data.error.includes("Invalid")) {
            document.getElementById("form-section").style.display = "none";
            document.getElementById("invalid-section").style.display = "block";
          }
        } else {
          showMsg("✅ " + data.message, "success");
          btn.disabled = true;
          btn.textContent = "Done!";
          setTimeout(() => window.location.href = "/login", 2500);
        }
      } catch (e) {
        showMsg("Network error. Please try again.", "error");
        btn.disabled = false;
        btn.textContent = "Reset Password";
      }
    }

    function showMsg(text, type) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = "msg " + type;
      el.style.display = "block";
    }
  </script>
</body>
</html>
